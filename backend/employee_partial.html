<div id="view-employee">
    <header class="navbar navbar-expand-md d-print-none glass-header">
        <div class="container-xl">
            <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3">
                <span data-i18n="employeeDashboard.dashboard">Dashboard</span>
            </h1>
            <div class="navbar-nav flex-row order-md-last">
                <div class="nav-item">
                    <button class="btn btn-outline-secondary me-2 js-employee-profile-btn" title="My Profile">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="18" height="18" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0"/><path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"/></svg>
                        <span data-i18n="profile.myProfile">My Profile</span>
                    </button>
                </div>
                <div class="nav-item">
                    <button class="btn btn-outline-danger logout-btn">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2" />
                        <path d="M9 12h12l-3 -3" />
                        <path d="M18 15l3 -3" />
                      </svg>
                      <span class="logout-btn-text ms-1" data-i18n="common.logout">Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl">

                <!-- Employee Dashboard Panel -->
                <div id="employee-dashboard-panel">
                    <!-- Location Alerts -->
                    <div id="location-alerts-container" class="mb-3"></div>

                    <div class="row row-cards">
                        <div class="col-md-6">
                            <div class="card premium-card">
                                <div class="card-header">
                                    <h3 class="card-title" data-i18n="employeeDashboard.dailyAttendance">Daily Attendance</h3>
                                </div>
                                <div class="card-body text-center">
                                    <div class="mb-3">
                                        <p class="text-muted">Welcome, <strong id="employee-name"></strong></p>
                                    </div>
                                    <!-- Location Status Badge (shown only when geofencing is enabled) -->
                                    <div id="location-status-container" style="display: none;" class="mb-3">
                                        <div id="location-status-badge" class="badge fs-6 px-3 py-2" aria-live="polite" aria-atomic="true">
                                            <!-- Populated by JS -->
                                        </div>
                                        <div id="location-distance-display" class="text-muted small mt-1" aria-live="polite"></div>
                                        <div id="employee-location-map" style="height: 300px; border-radius: 12px; margin-top: 1rem; border: 1px solid rgba(0,0,0,0.1); display: none;"></div>
                                    </div>

                                    <!-- Attendance Buttons Skeleton (shown while data is loading) -->
                                    <div id="attendance-buttons-skeleton" class="placeholder-glow mb-4">
                                        <div class="d-flex justify-content-center gap-3">
                                            <div class="placeholder col-5 py-4 rounded-3" style="height: 48px;"></div>
                                            <div class="placeholder col-5 py-4 rounded-3" style="height: 48px;"></div>
                                        </div>
                                    </div>

                                    <div id="attendance-buttons-container" class="d-flex justify-content-center gap-3 mb-4" style="display: none !important;">
                                        <button id="btn-checkin" class="btn btn-success btn-lg">
                                            <span id="checkin-spinner" class="spinner-border spinner-border-sm me-2" role="status" style="display: none;"></span>
                                            <svg id="checkin-icon" xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-login" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2" /><path d="M20 12h-13l3 -3m0 6l-3 -3" /></svg>
                                            <span id="checkin-btn-text" data-i18n="employeeDashboard.checkIn">Check In</span>
                                        </button>
                                        <button id="btn-checkout" class="btn btn-warning btn-lg text-white">
                                            <span id="checkout-spinner" class="spinner-border spinner-border-sm me-2" role="status" style="display: none;"></span>
                                            <svg id="checkout-icon" xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-logout" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2" /><path d="M9 12h12l-3 -3m0 6l3 -3" /></svg>
                                            <span id="checkout-btn-text" data-i18n="employeeDashboard.checkOut">Check Out</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card premium-card">
                                <div class="card-header">
                                    <h3 class="card-title" data-i18n="employeeDashboard.recentHistory">Recent History</h3>
                                </div>
                                <div class="table-responsive">
                                    <table class="table card-table table-vcenter">
                                        <thead>
                                            <tr>
                                                <th data-i18n="employeeDashboard.date">Date</th>
                                                <th data-i18n="employeeDashboard.in">In</th>
                                                <th data-i18n="employeeDashboard.status">Status</th>
                                                <th data-i18n="employeeDashboard.out">Out</th>
                                                <th data-i18n="employeeDashboard.status">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody id="employee-history-table">
                                            <!-- To be populated by JS -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Leave Request Section -->
                        <div class="col-md-12">
                            <div class="card premium-card">
                                <div class="card-header">
                                    <h3 class="card-title" data-i18n="employeeDashboard.leaveRequests">Leave Requests</h3>
                                </div>
                                <div class="card-body">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <div>
                                            <h5 class="mb-1" data-i18n="employeeDashboard.submitLeaveRequest">Submit Leave Request</h5>
                                            <p class="text-muted mb-0" data-i18n="employeeDashboard.leaveRequestDescription">Request time off for vacation, sick leave, or other reasons</p>
                                        </div>
                                        <button class="btn btn-primary js-employee-add-leave" data-i18n="employeeDashboard.newLeaveRequest">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                                <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                                                <path d="M12 5l0 14" />
                                                <path d="M5 12l14 0" />
                                            </svg>
                                            <span data-i18n="employeeDashboard.newLeaveRequest">New Leave Request</span>
                                        </button>
                                    </div>
                                    
                                    <!-- Leave Requests Table -->
                                    <div id="employee-leave-requests-container">
                                        <!-- Will be populated by JavaScript -->
                                        <div class="text-center py-4">
                                            <div class="spinner-border text-primary" role="status">
                                                <span class="visually-hidden">Loading...</span>
                                            </div>
                                            <p class="mt-2 text-muted" data-i18n="common.loading">Loading...</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- My Monthly Schedule Section -->
                        <div class="col-md-12">
                            <div class="card premium-card">
                                <div class="card-header">
                                    <h3 class="card-title">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="icon me-1" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 5m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z" /><path d="M16 3l0 4" /><path d="M8 3l0 4" /><path d="M4 11l16 0" /><path d="M8 15h2v2h-2z" /><path d="M14 15h2v2h-2z" /></svg>
                                        <span data-i18n="employeeDashboard.mySchedule">My Monthly Schedule</span>
                                    </h3>
                                </div>
                                <div class="card-body">
                                    <div id="employee-schedule-container">
                                        <div class="text-center py-4">
                                            <div class="spinner-border text-primary" role="status">
                                                <span class="visually-hidden">Loading...</span>
                                            </div>
                                            <p class="mt-2 text-muted" data-i18n="common.loading">Loading...</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Employee Profile Panel -->
                <div id="employee-profile-panel" style="display: none;">
                    <div class="mb-3">
                        <button class="btn btn-outline-secondary btn-sm js-employee-back-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon me-1" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M15 6l-6 6l6 6"/></svg>
                            <span data-i18n="profile.backToDashboard">Back to Dashboard</span>
                        </button>
                    </div>
                    <div id="employee-profile-content">
                        <!-- Profile content rendered by Profile component -->
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
